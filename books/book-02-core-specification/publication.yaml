  current_book:
    id: B02
    title: MarkOrbit Core Specification
    role: converts Professional OS philosophy into executable Core architecture
  next_book:
    id: B03
    title: Workplace Framework
    role: defines professional work environment consuming the Core
  implementation_flow:
    - Book 01 — Professional OS
    - Book 02 — MarkOrbit Core Specification
    - Book 03 — Workplace Framework
    - Book 04 — MarkReg
    - Book 05 — MarkOrbit Lite
    - Book 06 — Mark Global Service Network
