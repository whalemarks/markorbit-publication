canonical_principle:
  statement: Principles define. Core provides. Business owns. Execution coordinates. Integration connects. Products consume.
  flow:
    - Principles define
    - Core provides
    - Business owns
    - Execution coordinates
    - Integration connects
    - Products consume

scope:
  owns:
    - Canonical Models
    - Core Domains
    - Core Objects
    - Core Services
    - Execution Primitives
    - Core Contracts
    - AI Capability Governance
    - Core Consumption Rules
    - MVP Execution Boundary
    - Codex Implementation Roadmap
  does_not_own:
    - Product UI
    - Product-specific workflows
    - Commercial pricing packages
    - Marketing copy
    - Deployment infrastructure
    - Vendor-specific integrations
    - Production prompt library
    - Full product PRDs

