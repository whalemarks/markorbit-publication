    - Task
    - Event
    - Notification
  collaboration_network:
    - Partner
    - Agent
    - Service Provider
    - Service Network
    - Routing
    - Communication

mvp:
  phases:
    - id: phase-1
      name: Foundation Core
      domains:
        must_implement:
          - Identity
          - Organization
          - User
          - Permission
          - Knowledge
        partial_implement:
          - Policy
          - Capability
    - id: phase-2
      name: Professional Core
      domains:
        must_implement:
          - Brand
          - Trademark
          - Jurisdiction
          - Classification
          - Document
        partial_implement:
          - Evidence
    - id: phase-3
      name: Business Execution Core
      domains:
        must_implement:
          - Customer
          - Order
          - Matter
          - Workflow Contract
          - Task
          - Event
        partial_implement:
          - Business Responsibility
          - Notification
    - id: phase-4
      name: Growth Core
      domains:
        partial_implement:
          - Communication
          - Agent
          - Service Provider
          - Routing
          - Opportunity
    - id: phase-5
      name: Network Core
      domains:
        reserved_boundary:
          - Partner
          - Service Network

  depth_types:
    - Must Implement
    - Partial Implement
    - Reserved Boundary
    - Deferred

  primary_consumers:
    - MarkReg
    - MarkOrbit Lite
    - Workplace
    - AI Agents
    - Codex Implementation

codex:
  waves:
    - id: wave-0
      name: Repository and Spec Scaffold
    - id: wave-1
      name: Foundation Core
    - id: wave-2
      name: Professional Core
    - id: wave-3
      name: Business Execution Core
    - id: wave-4
      name: AI Governance and Review
    - id: wave-5
      name: Product Consumption Baseline
    - id: wave-6
      name: Growth Core Baseline
    - id: wave-7
      name: Validation, Hardening and Release

  rules:
    - Specs Before Code
    - Matrix Before Task
    - Small Tasks Before Large Tasks
    - Domain Ownership Before Model Creation
    - Contracts Before Product Integration
    - Events Before Automation
    - Agent Contract Before AI Feature
    - Tests Before Acceptance
    - Deferred Scope Must Stay Deferred
    - Architecture Review Before Semantic Change

  task_status_values:
    - Draft
    - Ready
    - In Progress
    - Blocked
    - Implemented
    - Tested
    - Accepted
    - Rejected
    - Deferred
    - Superseded

spec_status_values:
  - Draft
  - Reviewing
  - Approved
  - Deprecated
  - Superseded
  - Archived

release:
  current:
    id: core-mvp-v0.1.0
    status: manuscript_draft_completed
    manuscript_chapters: completed
    appendices: pending
    core_specs: pending_scaffold
    codex_tasks: pending
    implementation: pending
  acceptance_standard:
    - core-specs structure exists
    - MVP domain specs exist
    - MVP object specs exist
    - MVP service specs exist
    - MVP event specs exist
    - MVP contract specs exist
    - MVP agent specs exist
    - MarkReg, Lite and Workplace have consumption contracts
    - AI agents operate under Agent Contracts
    - meaningful actions emit Events
    - high-risk AI output creates ReviewRequired
    - Core Object changes are auditable where risk exists
    - Codex tasks reference specs and acceptance criteria
    - deferred domains have reserved boundaries

prohibited_shortcuts:
  - build product screens before Core meaning
  - create database tables without Object specs
  - implement AI prompts without Agent Contracts
  - create services without domain ownership
  - change state without Events
  - consume Core without contracts
  - let products redefine Core meanings
  - let Codex invent architecture
  - implement deferred marketplace or analytics features early

next_recommended_steps:
  - Generate Appendix A — Glossary
