name: Book 05 PF-01B Metadata Normalization

on:
  push:
    branches:
      - agent/book-05-pf01b-pf02

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/book-05-pf01b-pf02
          fetch-depth: 0

      - name: Normalize CH02-CH47 metadata
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path("books/book-05-markreg/manuscript")
          files = sorted(root.glob("B05-CH-*.md"))
          targets = []

          for path in files:
              match = re.search(r"B05-CH-(\d{2})_", path.name)
              if not match:
                  continue
              chapter = int(match.group(1))
              if 2 <= chapter <= 47:
                  targets.append(path)

          if len(files) != 48:
              raise SystemExit(f"Expected 48 manuscript chapter files, found {len(files)}")
          if len(targets) != 46:
              raise SystemExit(f"Expected 46 PF-01B targets, found {len(targets)}")

          status_line = "**Status:** Complete Draft 1  "
          map_line = "**Chapter Map:** B05-TOC-V0.1 — Owner Accepted  "

          for path in targets:
              original = path.read_text(encoding="utf-8")
              lines = original.splitlines()
              header_limit = min(12, len(lines))

              status_indexes = [
                  index for index, line in enumerate(lines[:header_limit])
                  if line.startswith("**Status:**")
              ]
              map_indexes = [
                  index for index, line in enumerate(lines[:header_limit])
                  if line.startswith("**Chapter Map:**") or line.startswith("**Chapter Map ID:**")
              ]

              if len(status_indexes) != 1:
                  raise SystemExit(f"{path}: expected one Status line in header, found {len(status_indexes)}")
              if len(map_indexes) != 1:
                  raise SystemExit(f"{path}: expected one Chapter Map line in header, found {len(map_indexes)}")

              lines[status_indexes[0]] = status_line
              lines[map_indexes[0]] = map_line
              updated = "\n".join(lines)
              if original.endswith("\n"):
                  updated += "\n"
              path.write_text(updated, encoding="utf-8")

          for path in targets:
              header = path.read_text(encoding="utf-8").splitlines()[:12]
              if status_line not in header:
                  raise SystemExit(f"{path}: normalized Status line missing")
              if map_line not in header:
                  raise SystemExit(f"{path}: normalized Chapter Map line missing")

          print(f"Normalized {len(targets)} chapter files.")
          PY

          git diff --check

      - name: Commit normalized metadata
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No metadata changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books/book-05-markreg/manuscript/B05-CH-*.md
          git commit -m "Normalize Book 05 chapter metadata"
          git push origin HEAD:agent/book-05-pf01b-pf02
