name: Apply Book 05 Foundation on PR

on:
  pull_request:
    branches: [main]
    paths:
      - .github/book05-foundation-payload.b64
      - .github/workflows/apply-book05-foundation-pr.yml
      - .github/workflows/apply-book05-foundation.yml
      - books/book-05-markreg/README.md

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'book-05-foundation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: book-05-foundation
          fetch-depth: 0

      - name: Apply verified foundation pack
        shell: bash
        run: |
          set -euo pipefail
          echo "c477b637c56a5640748c30d4a077fc389f59bd20026cb340585158f95590d427  .github/book05-foundation-payload.b64" | sha256sum --check
          base64 --decode .github/book05-foundation-payload.b64 > /tmp/book05.tar.gz
          echo "b091a6c4db60fdea12a7d423b412dbcd4671d25b20ce634f6eb63dbd7582429b  /tmp/book05.tar.gz" | sha256sum --check
          mkdir -p books/book-05-markreg
          tar -xzf /tmp/book05.tar.gz -C books/book-05-markreg

          python - <<'PY'
          from pathlib import Path

          def rep(path, old, new, required=True):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  if required:
                      raise SystemExit(f'Missing expected text in {path}: {old!r}')
                  return
              p.write_text(text.replace(old, new), encoding='utf-8')

          rep('books/README.md',
              '| Book 05 | MarkReg | `book-05-markreg/` | Planned; next publication |',
              '| Book 05 | MarkReg: The Full-Lifecycle International Trademark Product | `book-05-markreg/` | Foundation Draft; B05-TOC-V0.1 candidate |')
          rep('books/README.md',
              'Planned Book 05–07 directories may remain absent until their approved scaffold tasks begin.',
              'Book 05 now has a controlled writing scaffold. Planned Book 06–07 directories may remain absent until their approved scaffold tasks begin.')

          rep('PUBLICATION-MANIFEST.md',
              '| Book 05 | MarkReg | `books/book-05-markreg/` | Planned |',
              '| Book 05 | MarkReg: The Full-Lifecycle International Trademark Product | `books/book-05-markreg/` | Foundation Draft; B05-TOC-V0.1 candidate |')
          rep('PUBLICATION-MANIFEST.md',
              'Planned missing Book 05–07 directories are expected to produce warnings only, not validation errors.',
              'Book 05 now has a controlled writing scaffold. Planned missing Book 06–07 directories are expected to produce warnings only, not validation errors.')
          rep('PUBLICATION-MANIFEST.md',
              'Positioning: Future publication subject for the flagship international trademark domain application and managed professional-service ecosystem showcase.',
              'Positioning: Defines the flagship full-lifecycle international trademark Product, including need understanding, recommendation, intake, filing preparation, governed execution handoff, examination, registration, maintenance, provider collaboration, and portfolio continuity.')
          rep('PUBLICATION-MANIFEST.md',
              'The candidate baseline is `MO-PUB-BASELINE-0001`.',
              'The effective baseline is `MO-PUB-BASELINE-0001`.')
          rep('PUBLICATION-MANIFEST.md',
              'owner reviews and merges the Portfolio Baseline\n→ baseline becomes effective\n→ Book 05 planning begins',
              'Portfolio Baseline merged and effective\n→ Book 05 Foundation Draft established\n→ owner reviews B05-TOC-V0.1\n→ controlled writing packs begin')

          rep('PUBLICATION-ROADMAP.md',
              '- Books 01–04 Portfolio Baseline owner review\n- Book 05 MarkReg positioning and chapter-map preparation',
              '- Books 01–04 Portfolio Baseline maintenance\n- Book 05 MarkReg Foundation Draft and chapter-map owner review')
          rep('PUBLICATION-ROADMAP.md',
              '| Book 05 | MarkReg | `books/book-05-markreg/` | Planned |',
              '| Book 05 | MarkReg: The Full-Lifecycle International Trademark Product | `books/book-05-markreg/` | Foundation Draft; B05-TOC-V0.1 candidate |')
          rep('PUBLICATION-ROADMAP.md',
              '- MO-PUB-BASELINE-0001 is ready for owner acceptance;\n- Book 05 planning may begin after merge;',
              '- MO-PUB-BASELINE-0001 was owner accepted through merge of PR #32;\n- Book 05 planning and controlled drafting may proceed;')

          roadmap = Path('PUBLICATION-ROADMAP.md')
          text = roadmap.read_text(encoding='utf-8')
          marker = '## Post-Baseline Publication Sequence\n'
          phase = '''## Phase 15 — Book 05 MarkReg Foundation Draft

Created the canonical Book 05 directory and established the first dedicated Product publication on the Books 01–04 Portfolio Baseline.

Phase 15 records that:

- the working title is `MarkReg: The Full-Lifecycle International Trademark Product`;
- B05-TOC-V0.1 proposes CH00–CH47 across seven parts;
- Product positioning, dependency, governance, and writing gates are defined;
- CH00–CH03 form the initial manuscript pack;
- Book 02, Book 03, and Book 04 authority boundaries remain unchanged;
- the current gate is owner review of the title, scope, and chapter map;
- unrestricted implementation, production deployment, and external protected action remain unauthorized.

'''
          if phase not in text:
              if marker not in text:
                  raise SystemExit('Missing roadmap insertion marker')
              roadmap.write_text(text.replace(marker, phase + marker), encoding='utf-8')

          for path in ['README.md']:
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              text = text.replace('| Book 05 | MarkReg | `books/book-05-markreg/` | Planned |',
                                  '| Book 05 | MarkReg: The Full-Lifecycle International Trademark Product | `books/book-05-markreg/` | Foundation Draft; B05-TOC-V0.1 candidate |')
              p.write_text(text, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text(encoding='utf-8')
          if '## 2026-07-14 — Book 05 MarkReg Foundation Draft' not in text:
              text = text.rstrip() + '''

## 2026-07-14 — Book 05 MarkReg Foundation Draft

- Created `books/book-05-markreg/`.
- Established the MarkReg Product constitution and Books 01–04 dependency lock.
- Added B05-TOC-V0.1 as a candidate CH00–CH47 chapter map.
- Drafted CH00–CH03 and the initial planning records.
- Kept implementation, production, and external protected-action gates closed.
'''
              changelog.write_text(text, encoding='utf-8')
          PY

      - name: Validate and commit
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          root = Path('books/book-05-markreg')
          required = [
            'README.md','BOOK-MANIFEST.md','BOOK-STATUS.md','BOOK-GOVERNANCE.md','publication.yaml','CHANGELOG.md',
            'manuscript/README.md','reviews/README.md',
            'planning/B05-PLN-0001_Positioning_and_Scope.md','planning/B05-PLN-0002_Dependency_Map.md','planning/B05-PLN-0003_Chapter_Map_and_Writing_Gates.md',
            'manuscript/B05-CH-00_Preface.md','manuscript/B05-CH-01_Table_of_Contents.md','manuscript/B05-CH-02_Why_MarkReg_Exists.md','manuscript/B05-CH-03_Product_Mission_and_Value_Proposition.md']
          missing=[x for x in required if not (root/x).exists() or not (root/x).read_text(encoding='utf-8').strip()]
          if missing: raise SystemExit(f'Missing files: {missing}')
          files=sorted((root/'manuscript').glob('B05-CH-*.md'))
          if [p.name[:9] for p in files] != ['B05-CH-00','B05-CH-01','B05-CH-02','B05-CH-03']:
              raise SystemExit('Unexpected manuscript set')
          for p in files:
              t=p.read_text(encoding='utf-8'); n=int(re.search(r'B05-CH-(\d{2})',p.name).group(1))
              if not t.splitlines()[0].startswith(f'# B05-CH-{n:02d} — '): raise SystemExit(f'Bad heading {p}')
              if t.count('```') % 2: raise SystemExit(f'Unbalanced fences {p}')
              nums=[int(x) for x in re.findall(r'^## (\d+)\. ',t,re.M)]
              if nums and nums != list(range(1,len(nums)+1)): raise SystemExit(f'Bad numbering {p}')
          toc=(root/'manuscript/B05-CH-01_Table_of_Contents.md').read_text(encoding='utf-8')
          if [int(x) for x in re.findall(r'^### B05-CH-(\d{2}) — ',toc,re.M)] != list(range(48)):
              raise SystemExit('TOC must define CH00-CH47')
          print('Book 05 foundation validation passed')
          PY

          rm -f .github/book05-foundation-payload.b64
          rm -f .github/workflows/apply-book05-foundation.yml
          rm -f .github/workflows/apply-book05-foundation-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Establish Book 05 MarkReg Foundation Draft"
          git push origin HEAD:book-05-foundation
