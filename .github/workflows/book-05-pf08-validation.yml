name: Book 05 PF-08 Validation

on:
  push:
    branches:
      - main
      - agent/book-05-pf08-structural-rendered-validation
      - agent/book-05-pf09-owner-rc1-decision
    paths:
      - "books/book-05-markreg/**"
      - ".github/workflows/book-05-pf08-validation.yml"
  pull_request:
    paths:
      - "books/book-05-markreg/**"
      - ".github/workflows/book-05-pf08-validation.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-book-05:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Append PF-09 changelog entry once
        if: (github.event_name == 'push' && github.ref_name == 'agent/book-05-pf09-owner-rc1-decision') || (github.event_name == 'pull_request' && github.head_ref == 'agent/book-05-pf09-owner-rc1-decision')
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("books/book-05-markreg/CHANGELOG.md")
          text = path.read_text(encoding="utf-8")
          marker = "## 2026-07-15 — PF-09 Owner RC1 and Publication Decision"
          if marker not in text:
              entry = """## 2026-07-15 — PF-09 Owner RC1 and Publication Decision

- Added B05-PUB-0010 Owner RC1 and Publication Decision Record.
- Added B05-REV-0029 PF-09 Owner RC1 and Publication Gate Review.
- Recorded `9da21c4b2325d35710a1ba1acd9be9ca42d988b3` as the exact RC1 content baseline.
- Recorded validated PF-08 head `6a210eb40d939eeea6f799c1be7435de7d5dd3aa` and final 579 / 579 passing validation result.
- Accepted CH00–CH47, B05-SPEC-0001–0004 v0.3, Appendix A–G and eleven retained Figure sources as the RC1 inventory.
- Upgraded B05-PUB-0008 RC1 Checklist to v1.0.
- Closed B05-PUBLICATION-FINISHING-PACK-001 at RC1, effective upon owner merge of the PF-09 pull request.
- Approved Release Candidate 1 effective upon owner merge.
- Kept final publication and public/commercial distribution unapproved.
- Kept implementation, production deployment, autonomous professional action and External Protected Action unauthorized.
- Required a new candidate baseline and renewed validation for material post-RC1 changes.

"""
              prefix = "# Book 05 Changelog\n\n"
              if not text.startswith(prefix):
                  raise SystemExit("Unexpected changelog header")
              path.write_text(prefix + entry + text[len(prefix):], encoding="utf-8")
          PY
          if ! git diff --quiet -- books/book-05-markreg/CHANGELOG.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add books/book-05-markreg/CHANGELOG.md
            git commit -m "Record Book 05 PF-09 owner RC1 decision"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: books/book-05-markreg/validation/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system rendering dependencies
        run: |
          sudo apt-get update -qq >/dev/null
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            fonts-dejavu-core \
            libcairo2 \
            libffi-dev \
            libgdk-pixbuf-2.0-0 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            shared-mime-info >/dev/null

      - name: Install Python validation dependencies
        run: python -m pip install -q -r books/book-05-markreg/validation/requirements.txt

      - name: Install Mermaid CLI and browser
        run: |
          npm install --silent --no-save @mermaid-js/mermaid-cli >/dev/null
          npx puppeteer browsers install chrome-headless-shell >/dev/null
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run structural and rendered validation
        id: validate
        shell: bash
        run: |
          set +e
          python books/book-05-markreg/validation/validate_book05.py > /tmp/pf08-console.log 2>&1
          status=$?
          cat /tmp/pf08-console.log
          mkdir -p books/book-05-markreg/build/pf08
          cp /tmp/pf08-console.log books/book-05-markreg/build/pf08/console.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ -f books/book-05-markreg/build/pf08/validation-report.json ]; then
            python - <<'PY'
          import json
          from pathlib import Path
          path = Path("books/book-05-markreg/build/pf08/validation-report.json")
          report = json.loads(path.read_text(encoding="utf-8"))
          print("PF-08 report status:", report["status"])
          print("PF-08 checks:", report["checks"])
          print("PF-08 passed:", report["passed"])
          for error in report.get("errors", []):
              print("::error::" + error.replace("\n", " "))
          for warning in report.get("warnings", []):
              print("::warning::" + warning.replace("\n", " "))
          PY
          fi
          exit 0

      - name: Publish PF-08 validation summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'books/book-05-markreg/build/pf08/validation-report.json';
            const consolePath = 'books/book-05-markreg/build/pf08/console.log';
            const marker = '<!-- book-05-pf08-validation -->';
            let body;
            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const errors = report.errors || [];
              const warnings = report.warnings || [];
              const errorBlock = errors.length
                ? `\n### Blocking errors\n${errors.map(e => `- ${e.replace(/\n/g, ' ')}`).join('\n')}`
                : '\n### Blocking errors\nNone.';
              const warningBlock = warnings.length
                ? `\n### Warnings\n${warnings.map(w => `- ${w.replace(/\n/g, ' ')}`).join('\n')}`
                : '\n### Warnings\nNone.';
              body = `${marker}\n## Book 05 PF-08 validation\n\n` +
                `- **Status:** ${report.status}\n` +
                `- **Checks:** ${report.checks}\n` +
                `- **Passed:** ${report.passed}\n` +
                `- **Errors:** ${errors.length}\n` +
                `- **Warnings:** ${warnings.length}\n` + errorBlock + '\n' + warningBlock;
            } else {
              const consoleText = fs.existsSync(consolePath)
                ? fs.readFileSync(consolePath, 'utf8').slice(-12000)
                : 'No console output was retained.';
              body = `${marker}\n## Book 05 PF-08 validation\n\n` +
                `Validation report was not generated. Validator traceback or console tail:\n\n` +
                `\`\`\`text\n${consoleText}\n\`\`\``;
            }
            body += `\n\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            }

      - name: Upload PF-08 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book-05-pf08-validation
          path: books/book-05-markreg/build/pf08/
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when PF-08 validation fails
        if: always() && steps.validate.outputs.exit_code != '0'
        run: exit 1
