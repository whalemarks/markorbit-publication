name: Book 05 PF-08 Validation

on:
  push:
    branches:
      - main
      - agent/book-05-pf08-structural-rendered-validation
    paths:
      - "books/book-05-markreg/**"
      - ".github/workflows/book-05-pf08-validation.yml"
  pull_request:
    paths:
      - "books/book-05-markreg/**"
      - ".github/workflows/book-05-pf08-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-book-05:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: books/book-05-markreg/validation/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-dejavu-core \
            libcairo2 \
            libffi-dev \
            libgdk-pixbuf-2.0-0 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            shared-mime-info

      - name: Install Python validation dependencies
        run: python -m pip install -r books/book-05-markreg/validation/requirements.txt

      - name: Install Mermaid CLI and browser
        run: |
          npm install --no-save @mermaid-js/mermaid-cli
          npx puppeteer browsers install chrome-headless-shell
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run structural and rendered validation
        run: python books/book-05-markreg/validation/validate_book05.py

      - name: Upload PF-08 validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: book-05-pf08-validation
          path: books/book-05-markreg/build/pf08/
          if-no-files-found: warn
          retention-days: 30
