name: Finalize Book 04 review validation

on:
  pull_request:
    types: [synchronize, reopened]
    paths:
      - .github/workflows/book04-manuscript-revise.yml

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Validate and write report
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          root = Path('books/book-04-workplace-product-architecture')
          manuscript = root / 'manuscript'
          files = sorted(manuscript.glob('B04-CH-*.md'))
          if len(files) != 40:
              raise SystemExit(f'expected 40 manuscript files, found {len(files)}')

          nums = []
          headings = {}
          for p in files:
              m = re.match(r'B04-CH-(\d{2})_', p.name)
              if not m:
                  raise SystemExit(f'unexpected manuscript filename: {p.name}')
              n = int(m.group(1))
              nums.append(n)
              text = p.read_text(encoding='utf-8')
              headings[n] = text.splitlines()[0]
              if text.count('```') % 2:
                  raise SystemExit(f'unbalanced code fences: {p}')
              section_nums = [int(x) for x in re.findall(r'^## (\d+)\. ', text, re.M)]
              if section_nums and section_nums != list(range(1, len(section_nums) + 1)):
                  raise SystemExit(f'non-sequential numbered sections: {p}')

          if nums != list(range(40)):
              raise SystemExit(f'chapter sequence mismatch: {nums}')

          toc = (manuscript / 'B04-CH-01_Table_of_Contents.md').read_text(encoding='utf-8')
          toc_titles = {int(n): title for n, title in re.findall(r'^### B04-CH-(\d{2}) — (.+)$', toc, re.M)}
          if set(toc_titles) != set(range(40)):
              raise SystemExit(f'TOC chapter set mismatch: {sorted(toc_titles)}')
          for n in range(40):
              expected = f'# B04-CH-{n:02d} — {toc_titles[n]}'
              if headings[n] != expected:
                  raise SystemExit(f'heading mismatch CH{n:02d}: {headings[n]!r} != {expected!r}')

          active = [
              Path('README.md'),
              Path('PUBLICATION-MANIFEST.md'),
              Path('PUBLICATION-ROADMAP.md'),
              Path('books/README.md'),
              root / 'README.md',
              root / 'BOOK-MANIFEST.md',
              root / 'BOOK-STATUS.md',
              root / 'BOOK-GOVERNANCE.md',
              root / 'publication.yaml',
              root / 'planning/B04-PLN-0004_Chapter_Writing_Gates.md',
              root / 'planning/B04-PLN-0006_Writing_Pack_Plan.md',
              root / 'reviews/README.md',
          ]
          stale = [
              'Paused Before Part V',
              'paused_not_drafted',
              'CH28–CH39 remain intentionally undrafted',
              'CH28–CH39 are intentionally paused',
              'B04-CH-28 through B04-CH-39 are not drafted',
          ]
          for p in active:
              text = p.read_text(encoding='utf-8')
              for s in stale:
                  if s in text:
                      raise SystemExit(f'stale status in {p}: {s}')

          word_count = sum(len(re.findall(r"\b[\w'-]+\b", p.read_text(encoding='utf-8'))) for p in files)
          diff_stat = subprocess.run(
              ['git', 'diff', '--stat', 'origin/main...HEAD'],
              check=True,
              text=True,
              capture_output=True,
          ).stdout.strip()

          report = f'''# B04-REV-0003 — Validation Report

- **Validation date:** 2026-07-14
- **Branch:** `review/book-04-full-draft-1`
- **Scope:** B04-CH-00 through B04-CH-39
- **Result:** PASS

## Structural Checks

- Manuscript files: **{len(files)}**
- Chapter range: **CH{nums[0]:02d}–CH{nums[-1]:02d}**
- TOC and first-heading match: **PASS**
- Balanced Markdown triple-backtick fences: **PASS**
- Sequential numbered sections where used: **PASS**
- Active status records free of locked stale strings: **PASS**
- Approximate manuscript word count: **{word_count:,}**

## Diff Stat Against Main

```text
{diff_stat}
```

## Boundary Result

- Chapter-map change required: **NO**
- Book 02 semantic amendment required: **NO**
- Book 03 Execution amendment required: **NO**
- Ready for final publication: **NO**
- Ready for unrestricted implementation: **NO**
- External protected action authorized: **NO**
'''
          path = root / 'reviews/B04-REV-0003_VALIDATION.md'
          path.write_text(report, encoding='utf-8')
          print(report)
          PY

      - name: Commit validation report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books/book-04-workplace-product-architecture/reviews/B04-REV-0003_VALIDATION.md
          if git diff --cached --quiet; then
            echo "No validation report changes"
            exit 0
          fi
          git commit -m "Record Book 04 full-book validation"
          git push origin HEAD:${{ github.head_ref }}
