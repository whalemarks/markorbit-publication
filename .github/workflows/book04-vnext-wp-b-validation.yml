name: Book 04 vNext WP-B Validation

on:
  pull_request:
    paths:
      - "books/book-04-workplace-product-architecture/**"
      - "codex/tasks/PUB-TASK-B04-VNEXT-WP-B.md"
      - "tools/validate_book04_vnext_wp_b.py"
      - ".github/workflows/book04-vnext-wp-b-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: book04-vnext-wp-b-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wp-b:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out publication repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate records and authority model
        run: python tools/validate_book04_vnext_wp_b.py --only records
      - name: Validate chapter correction coverage
        run: python tools/validate_book04_vnext_wp_b.py --only coverage
      - name: Validate protected source boundary
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python tools/validate_book04_vnext_wp_b.py --only diff --base-sha "$BASE_SHA"