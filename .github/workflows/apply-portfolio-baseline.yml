name: Apply Books 01-04 Portfolio Baseline

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/portfolio-baseline-patch.part*
      - .github/workflows/apply-portfolio-baseline.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out portfolio review branch
        uses: actions/checkout@v4
        with:
          ref: review/books-01-04-portfolio-baseline
          fetch-depth: 0

      - name: Assemble and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/portfolio-baseline-patch.part{00..09} > /tmp/portfolio.patch.b64
          echo "fb37e7f48d515ae62fcdea65af04cac4f15b6103776d728c0b53c17377ec2b92  /tmp/portfolio.patch.b64" | sha256sum --check
          base64 --decode /tmp/portfolio.patch.b64 > /tmp/portfolio.patch.gz
          echo "0cac4ffc149505f25bf5e19ae76be8c96b35739e161160e2b39fd5f30ffc18f0  /tmp/portfolio.patch.gz" | sha256sum --check
          gunzip -c /tmp/portfolio.patch.gz > /tmp/portfolio.patch
          echo "f6819f6afdf7b8aa50c3d6bcb1afd7c511c1d2c2eb3a6e816803becc8e710423  /tmp/portfolio.patch" | sha256sum --check
          git apply --check --whitespace=nowarn /tmp/portfolio.patch
          git apply --whitespace=nowarn /tmp/portfolio.patch

      - name: Validate portfolio baseline
        shell: bash
        run: |
          set -euo pipefail
          git diff --quiet -- books/book-02-core-specification

          python - <<'PY'
          from pathlib import Path
          from urllib.parse import unquote
          import re
          import subprocess

          root = Path.cwd()
          errors = []

          b1 = root / "books/book-01-operating-system"
          b2 = root / "books/book-02-core-specification"
          b3 = root / "books/book-03-execution-system"
          b4 = root / "books/book-04-workplace-product-architecture"

          for path in (b1, b2, b3, b4):
              if not path.is_dir():
                  errors.append(f"Missing book directory: {path}")

          b1_manuscript = sorted(
              p for p in (b1 / "manuscript").glob("*.md") if p.name != "README.md"
          )
          if len(b1_manuscript) != 14:
              errors.append(f"Book 01 expected 14 manuscript files, found {len(b1_manuscript)}")

          b3_chapters = sorted((b3 / "manuscript").glob("B03-CH-*.md"))
          b3_numbers = []
          for path in b3_chapters:
              match = re.match(r"B03-CH-(\d{2})_", path.name)
              if match:
                  b3_numbers.append(int(match.group(1)))
          if b3_numbers != list(range(35)):
              errors.append(f"Book 03 expected CH00-CH34, found {b3_numbers}")

          b4_chapters = sorted((b4 / "manuscript").glob("B04-CH-*.md"))
          b4_numbers = []
          for path in b4_chapters:
              match = re.match(r"B04-CH-(\d{2})_", path.name)
              if match:
                  b4_numbers.append(int(match.group(1)))
          if b4_numbers != list(range(40)):
              errors.append(f"Book 04 expected CH00-CH39, found {b4_numbers}")

          active_manuscripts = b1_manuscript + b3_chapters + b4_chapters
          for path in active_manuscripts:
              text = path.read_text(encoding="utf-8")
              lines = text.splitlines()
              if not lines or not lines[0].startswith("# "):
                  errors.append(f"Missing H1: {path}")
              if text.count("```") % 2:
                  errors.append(f"Unbalanced fenced code blocks: {path}")
              numbered = [
                  int(m.group(1))
                  for line in lines
                  if (m := re.match(r"## (\d+)\. ", line))
              ]
              if numbered and numbered != list(range(1, len(numbered) + 1)):
                  errors.append(f"Non-sequential numbered sections: {path}")

          for path in b3_chapters:
              text = path.read_text(encoding="utf-8")
              if "**Status:** Release Candidate 1" not in text:
                  errors.append(f"Book 03 chapter not marked RC1: {path}")

          b1_text = "\n".join(p.read_text(encoding="utf-8") for p in b1_manuscript).lower()
          b1_stale = [
              "workplace framework",
              "ecosystem before organisation",
              "artificial intelligence learns from workplace activity",
              "products serve technology",
              "book 04 — markreg",
              "book 05 — lite",
              "book 06 — mgsn",
          ]
          for phrase in b1_stale:
              if phrase in b1_text:
                  errors.append(f"Book 01 stale architecture phrase remains: {phrase}")

          b3_text = "\n".join(p.read_text(encoding="utf-8") for p in b3_chapters).lower()
          b3_stale = [
              "book 04 product system",
              "book 04 — product system",
              "book 04 — markorbit product system",
              "workplace is a product surface",
              "tenant or organization",
              "organization or tenant",
          ]
          for phrase in b3_stale:
              if phrase in b3_text:
                  errors.append(f"Book 03 stale architecture phrase remains: {phrase}")

          b1_figures = sorted((b1 / "figures").glob("B01-FIG-*.md"))
          b3_figures = sorted((b3 / "figures").glob("B03-FIG-*.md"))
          if len(b1_figures) != 12:
              errors.append(f"Book 01 expected 12 figures, found {len(b1_figures)}")
          if len(b3_figures) != 10:
              errors.append(f"Book 03 expected 10 figures, found {len(b3_figures)}")
          for path in b1_figures + b3_figures:
              if "```mermaid" not in path.read_text(encoding="utf-8"):
                  errors.append(f"Figure missing Mermaid diagram: {path}")

          b1_publication = sorted((b1 / "publication").glob("B01-PUB-*.md"))
          b3_publication = sorted((b3 / "publication").glob("B03-PUB-*.md"))
          if len(b1_publication) != 7:
              errors.append(f"Book 01 expected 7 publication records, found {len(b1_publication)}")
          if len(b3_publication) != 7:
              errors.append(f"Book 03 expected 7 publication records, found {len(b3_publication)}")

          required = [
              root / "reviews/portfolio/MO-PUB-REV-0001_Books_01-04_Portfolio_Baseline_Review.md",
              root / "release/baselines/MO-PUB-BASELINE-0001_Books_01-04.md",
              b1 / "reviews/B01-REV-0001_Portfolio_Baseline_and_RC1_Review.md",
              b3 / "reviews/B03-REV-0007_Publication_Finishing_and_RC1_Review.md",
              b4 / "reviews/B04-REV-0005_Portfolio_Baseline_Lock.md",
              root / "architecture/MARKORBIT-ORBITAL-ARCHITECTURE-CANON-vNEXT.md",
          ]
          for path in required:
              if not path.is_file() or not path.read_text(encoding="utf-8").strip():
                  errors.append(f"Missing required record: {path}")

          status_output = subprocess.check_output(
              ["git", "status", "--porcelain=v1"], text=True
          )
          changed_md = []
          for line in status_output.splitlines():
              if not line:
                  continue
              path_text = line[3:]
              if " -> " in path_text:
                  path_text = path_text.split(" -> ", 1)[1]
              path = root / path_text
              if path.suffix.lower() == ".md" and path.exists():
                  changed_md.append(path)

          link_pattern = re.compile(r"!?\[[^\]]*\]\(([^)]+)\)")
          for path in changed_md:
              text = path.read_text(encoding="utf-8")
              for raw_target in link_pattern.findall(text):
                  target = raw_target.strip().strip("<>")
                  if not target or target.startswith(("#", "http://", "https://", "mailto:")):
                      continue
                  target = target.split(" ", 1)[0]
                  target = unquote(target.split("#", 1)[0].split("?", 1)[0])
                  if not target:
                      continue
                  resolved = (root / target.lstrip("/")) if target.startswith("/") else (path.parent / target)
                  if not resolved.resolve().exists():
                      errors.append(f"Broken relative link in {path}: {raw_target}")

          if errors:
              raise SystemExit("\n".join(errors))

          print("PASS Books 01-04 Portfolio Baseline validation")
          print(f"Book 01 manuscript files: {len(b1_manuscript)}")
          print(f"Book 03 chapters: {len(b3_chapters)}")
          print(f"Book 04 chapters: {len(b4_chapters)}")
          print(f"Book 01 figures/publication records: {len(b1_figures)}/{len(b1_publication)}")
          print(f"Book 03 figures/publication records: {len(b3_figures)}/{len(b3_publication)}")
          PY

      - name: Remove temporary application files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/export-books-01-04-portfolio.yml
          rm -f .github/workflows/apply-portfolio-baseline.yml
          rm -f .github/portfolio-baseline-patch.part*

      - name: Commit portfolio baseline
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet -- books/book-02-core-specification
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Establish Books 01-04 Portfolio Baseline"
          git push origin HEAD:review/books-01-04-portfolio-baseline
