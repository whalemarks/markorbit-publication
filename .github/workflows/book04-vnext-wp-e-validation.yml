name: Book 04 vNext WP-E Validation

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-wp-e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out publication repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate WP-E records and protected boundary
        run: python tools/validate_book04_vnext_wp_e.py --base-sha "${{ github.event.pull_request.base.sha }}"
