name: Book 04 vNext WP-C Validation

on:
  pull_request:
    paths:
      - "books/book-04-workplace-product-architecture/**"
      - "codex/tasks/PUB-TASK-B04-VNEXT-WP-C.md"
      - "tools/validate_book04_vnext_wp_c.py"
      - ".github/workflows/book04-vnext-wp-c-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: book04-vnext-wp-c-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wp-c:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out publication repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate WP-C records and protected boundary
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python tools/validate_book04_vnext_wp_c.py \
            --base-sha "$BASE_SHA"
