name: Apply Book 04 review corrections

on:
  push:
    branches:
      - agent/book-04-ch00-27-review

permissions:
  contents: write

jobs:
  apply-review-corrections:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: true
      - name: Apply reviewed chapter corrections
        run: python .github/scripts/book04_review_apply.py
      - name: Validate corrected manuscript files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          paths = sorted(Path('books/book-04-workplace-product-architecture/manuscript').glob('B04-CH-*.md'))
          if len(paths) < 28:
              raise SystemExit(f'Expected at least 28 Book 04 manuscript files, found {len(paths)}')
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if text.count('```') % 2:
                  raise SystemExit(f'Unbalanced code fences: {path}')
              numbers = [int(match.group(1)) for line in text.splitlines() if (match := re.match(r'## (\d+)\.', line))]
              if numbers and numbers != list(range(1, max(numbers) + 1)):
                  raise SystemExit(f'Non-sequential numbered sections: {path}')
          print(f'Validated {len(paths)} Book 04 manuscript files')
          PY
      - name: Remove temporary automation and commit
        shell: bash
        run: |
          rm -f .github/scripts/book04_review_apply.py
          rm -f .github/workflows/book04-review-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add books/book-04-workplace-product-architecture/manuscript .github/scripts/book04_review_apply.py .github/workflows/book04-review-apply.yml
          git commit -m "apply Book 04 chapter review corrections"
          git push origin HEAD:${{ github.ref_name }}
