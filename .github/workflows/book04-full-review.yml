              '''Need
→ Artifact Candidate
→ Preparation
→ Review
→ Revision
→ Approval for Defined Use
→ Render
→ Optional Edit
→ Delivery / Publish / Formalization
→ Outcome
→ Feedback
→ Reuse, Supersession, Archive, or Retirement''',
              '''Need
→ Artifact Candidate
→ Preparation
→ Preview Render Where Useful
→ Review
→ Revision
→ Approval for Defined Use
→ Final Render
→ Optional Edit
→ Re-Review Where Material
→ Delivery / Publish / Formalization
→ Outcome
→ Feedback
→ Reuse, Supersession, Archive, or Retirement'''
          )

