name: Review and revise Book 04 Draft 1

on:
  push:
    branches:
      - review/book-04-full-draft-1
    paths:
      - .github/workflows/book04-full-review.yml

permissions:
  contents: write

jobs:
  review-and-revise:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: review/book-04-full-draft-1
          fetch-depth: 0

