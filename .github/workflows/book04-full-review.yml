A request should identify whether it seeks to:

- create;
- update;
- submit;
- send;
- approve;
- record;
- attach;
- supersede;
- cancel;
- publish;
- deliver.

A generic `save as official` action is insufficient.

---

## 5. Formalization Request Is a Prepared Action''',
