          → targeted revision or owner acceptance
          → publication editorial finishing
          → final publication gate
          ```

          ## 13. Publication Finishing Boundary

          Full-book architecture review does not complete native-English line editing, final compression, diagrams, citation work, glossary reconciliation, indexing, cross-book reconciliation, or release-candidate packaging. Those remain separate publication gates.

          ## 14. Change Control

