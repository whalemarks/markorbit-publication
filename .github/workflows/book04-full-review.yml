          marker = '# Changelog\n'
          if entry.strip() not in changelog:
              changelog = changelog.replace(marker, marker + entry + '\n', 1)
              (root / 'CHANGELOG.md').write_text(changelog, encoding='utf-8')

          # Validation: chapter coverage, titles, fences and numbered sections.
          files = sorted(manuscript.glob('B04-CH-*.md'))
          by_number = {}
          for path in files:
              match = re.match(r'B04-CH-(\d{2})_', path.name)
              if match:
                  by_number[int(match.group(1))] = path
          expected = list(range(40))
          if sorted(by_number) != expected:
              raise SystemExit(f'Expected CH00-CH39, found {sorted(by_number)}')

          toc = (manuscript / 'B04-CH-01_Table_of_Contents.md').read_text(encoding='utf-8')
          toc_titles = {}
          for line in toc.splitlines():
              match = re.match(r'### B04-CH-(\d{2}) — (.+)$', line)
              if match:
                  toc_titles[int(match.group(1))] = match.group(2)
          if sorted(toc_titles) != expected:
              raise SystemExit(f'TOC chapter coverage mismatch: {sorted(toc_titles)}')

          errors = []
          total_words = 0
          for number in expected:
              path = by_number[number]
              text = path.read_text(encoding='utf-8')
              total_words += len(re.findall(r"\b[\w’'-]+\b", text))
              first = text.splitlines()[0] if text.splitlines() else ''
              expected_heading = f'# B04-CH-{number:02d} — {toc_titles[number]}'
              if first != expected_heading:
                  errors.append(f'{path.name}: {first!r} != {expected_heading!r}')
              if text.count('```') % 2:
                  errors.append(f'{path.name}: unbalanced fenced code blocks')
              numbered = [int(m.group(1)) for m in map(lambda line: re.match(r'## (\d+)\. ', line), text.splitlines()) if m]
              if numbered and numbered != list(range(1, len(numbered) + 1)):
                  errors.append(f'{path.name}: non-sequential numbered sections')

          stale_files = [
              book / 'README.md',
              book / 'BOOK-MANIFEST.md',
              book / 'BOOK-STATUS.md',
