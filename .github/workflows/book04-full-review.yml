          changelog = (root / 'CHANGELOG.md').read_text(encoding='utf-8')
          entry = dedent(r'''

          ## 2026-07-14 — Book 04 Complete Draft 1 Full-Book Review

          - Confirmed CH00–CH39 as the complete Book 04 Draft 1 baseline.
          - Completed full-book architecture, authority, boundary, progression, and targeted editorial review.
