name: Apply and validate Book 04 RC1 publication finishing

on:
  push:
    branches:
      - review/book-04-publication-finishing
    paths:
      - .github/book04-rc1-payload.part*
      - .github/workflows/book04-export-for-edit.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out publication-finishing branch
        uses: actions/checkout@v4
        with:
          ref: review/book-04-publication-finishing
          fetch-depth: 0

      - name: Assemble and verify RC1 patch
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/book04-rc1-payload.part00 \
            .github/book04-rc1-payload.part01 \
            .github/book04-rc1-payload.part02 \
            .github/book04-rc1-payload.part03 \
            .github/book04-rc1-payload.part04 \
            > /tmp/book04-rc1.b64

          echo "5691eabe7aaac969d321074ab3d2d72212efe5587c0d0ebd9ce5cabb23dcd8af  /tmp/book04-rc1.b64" | sha256sum --check
          base64 --decode /tmp/book04-rc1.b64 > /tmp/book04-rc1.patch.gz
          echo "18b8ca2bda73c7c42ce346b19169615d84eeabbac6d87e0ae046012dea8d8f60  /tmp/book04-rc1.patch.gz" | sha256sum --check
          gunzip -c /tmp/book04-rc1.patch.gz > /tmp/book04-rc1.patch
          patch -p0 --batch --forward < /tmp/book04-rc1.patch

      - name: Validate Book 04 Release Candidate 1
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path("books/book-04-workplace-product-architecture")
          manuscript = root / "manuscript"
          errors: list[str] = []

          files = sorted(manuscript.glob("B04-CH-*.md"))
          if len(files) != 40:
              errors.append(f"expected 40 manuscript files, found {len(files)}")

          by_number: dict[int, Path] = {}
          for path in files:
              match = re.match(r"B04-CH-(\d{2})_", path.name)
              if not match:
                  errors.append(f"invalid manuscript filename: {path.name}")
                  continue
              by_number[int(match.group(1))] = path

          if sorted(by_number) != list(range(40)):
              errors.append(f"chapter sequence mismatch: {sorted(by_number)}")

          toc_text = by_number[1].read_text(encoding="utf-8")
          toc = {
              int(number): title.strip()
              for number, title in re.findall(
                  r"^### B04-CH-(\d{2}) — (.+)$", toc_text, re.MULTILINE
              )
          }
          if sorted(toc) != list(range(40)):
              errors.append(f"TOC sequence mismatch: {sorted(toc)}")

          for number, path in sorted(by_number.items()):
              text = path.read_text(encoding="utf-8")
              lines = text.splitlines()
              first = lines[0] if lines else ""
              if number >= 2:
                  expected = f"# B04-CH-{number:02d} — {toc[number]}"
                  if first != expected:
                      errors.append(
                          f"{path.name}: first heading {first!r} != {expected!r}"
                      )
              elif not first.startswith(f"# B04-CH-{number:02d} — "):
                  errors.append(f"{path.name}: invalid front-matter heading")

              head = "\n".join(lines[:10])
              if "**Status:** Release Candidate 1" not in head:
                  errors.append(f"{path.name}: missing Release Candidate 1 status")
              if "**Writing Pack:**" in text:
                  errors.append(f"{path.name}: internal writing-pack metadata remains")
              if re.search(r"\bChapter \d{2}\b", text):
                  errors.append(f"{path.name}: stale Chapter XX reference")
              if text.count("```") % 2:
                  errors.append(f"{path.name}: unbalanced fenced code blocks")

              numbered = [
                  int(value)
                  for value in re.findall(r"^## (\d+)\. ", text, re.MULTILINE)
              ]
              if numbered and numbered != list(range(1, len(numbered) + 1)):
                  errors.append(f"{path.name}: non-sequential numbered sections")

          for path in root.rglob("*.md"):
              text = path.read_text(encoding="utf-8")
              if text.count("```") % 2:
                  errors.append(f"{path.relative_to(root)}: unbalanced fences")
              for target_text in re.findall(r"\[[^\]]+\]\(([^)]+)\)", text):
                  if target_text.startswith(("http://", "https://", "#", "mailto:")):
                      continue
                  target_path = (path.parent / target_text.split("#", 1)[0]).resolve()
                  if str(target_path).startswith(str(root.resolve())) and not target_path.exists():
                      errors.append(
                          f"{path.relative_to(root)}: broken relative link {target_text}"
                      )

          publication = root / "publication"
          expected_publication_assets = [
              "B04-PUB-0001_Editorial_Style_and_Terminology.md",
              "B04-PUB-0002_Source_and_Authority_Notes.md",
              "B04-PUB-0003_Glossary.md",
              "B04-PUB-0004_Subject_Index.md",
              "B04-PUB-0005_Figure_Register.md",
              "B04-PUB-0006_Cross-Book_Reconciliation.md",
              "B04-PUB-0007_RC1_Checklist.md",
          ]
          for filename in expected_publication_assets:
              path = publication / filename
              if not path.exists() or not path.read_text(encoding="utf-8").strip():
                  errors.append(f"missing or empty publication asset: {filename}")

          figures = sorted((root / "figures").glob("B04-FIG-*.md"))
          if len(figures) != 10:
              errors.append(f"expected 10 architecture figures, found {len(figures)}")
          for path in figures:
              if "```mermaid" not in path.read_text(encoding="utf-8"):
                  errors.append(f"{path.name}: missing Mermaid figure")

          for filename in (
              "B04-PUB-0003_Glossary.md",
              "B04-PUB-0004_Subject_Index.md",
          ):
              text = (publication / filename).read_text(encoding="utf-8")
              for reference in re.findall(r"CH(\d{2})", text):
                  if int(reference) not in by_number:
                      errors.append(f"{filename}: invalid chapter reference CH{reference}")

          combined = "\n".join(
              path.read_text(encoding="utf-8") for path in files
          )
          responsibility_lock = [
              "Core defines shared meaning.",
              "Execution governs coordinated work.",
              "Workplace provides authorized organization context.",
              "Products compose focused user journeys.",
              "MGSN connects independent organizational Orbits.",
              "Owning Services change and record formal business facts.",
              "Humans remain professionally accountable.",
              "AI assists under explicit governance.",
          ]
          for statement in responsibility_lock:
              if statement not in combined:
                  errors.append(f"missing canonical responsibility statement: {statement}")

          words = sum(
              len(re.findall(r"\b[\w'-]+\b", path.read_text(encoding="utf-8")))
              for path in files
          )

          print(f"manuscript_files={len(files)}")
          print(f"approximate_manuscript_words={words}")
          print(f"publication_assets={len(expected_publication_assets)}")
          print(f"architecture_figures={len(figures)}")
          print(f"book04_markdown_files={len(list(root.rglob('*.md')))}")

          if errors:
              print("\n".join(f"ERROR: {error}" for error in errors))
              sys.exit(1)

          print("BOOK 04 RC1 VALIDATION PASS")
          PY

      - name: Remove temporary RC1 application files
        shell: bash
        run: |
          rm -f .github/book04-rc1-payload.part*
          rm -f .github/workflows/book04-export-for-edit.yml

      - name: Commit Book 04 Release Candidate 1
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Finish Book 04 publication and prepare RC1"
          git push origin HEAD:review/book-04-publication-finishing
