name: Export Book 01-04 for Book 04 publication editing

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/book04-export-for-edit.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out publication-finishing branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Build Book 01-04 editing bundle
        run: |
          tar -czf book01-04-editing-bundle.tar.gz \
            books/book-01-operating-system \
            books/book-02-core-specification \
            books/book-03-execution-system \
            books/book-04-workplace-product-architecture
      - name: Upload editing bundle
        uses: actions/upload-artifact@v4
        with:
          name: book01-04-editing-bundle
          path: book01-04-editing-bundle.tar.gz
          if-no-files-found: error
          retention-days: 1
