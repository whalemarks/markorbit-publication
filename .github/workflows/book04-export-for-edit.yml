name: Export Book 04 for publication editing

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/book04-export-for-edit.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out publication-finishing branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Build Book 04 editing bundle
        run: |
          tar -czf book04-editing-bundle.tar.gz \
            books/book-04-workplace-product-architecture \
            books/book-01-markorbit-operating-system \
            books/book-02-markorbit-core \
            books/book-03-markorbit-execution-system \
            2>/dev/null || \
          tar -czf book04-editing-bundle.tar.gz books/book-04-workplace-product-architecture
      - name: Upload editing bundle
        uses: actions/upload-artifact@v4
        with:
          name: book04-editing-bundle
          path: book04-editing-bundle.tar.gz
          if-no-files-found: error
          retention-days: 1
