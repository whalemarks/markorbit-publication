name: Export Books 01-04 Portfolio

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4

      - name: Package Books 01-04 and repository publication metadata
        shell: bash
        run: |
          set -euo pipefail
          tar -czf books-01-04-portfolio.tar.gz \
            README.md \
            books/README.md \
            books/book-01-operating-system \
            books/book-02-core-specification \
            books/book-03-execution-system \
            books/book-04-workplace-product-architecture \
            publication-manifest* \
            PUBLICATION-* \
            ROADMAP* \
            CHANGELOG* \
            2>/dev/null || true
          test -s books-01-04-portfolio.tar.gz

      - name: Upload portfolio source
        uses: actions/upload-artifact@v4
        with:
          name: books-01-04-portfolio-source
          path: books-01-04-portfolio.tar.gz
          retention-days: 1
