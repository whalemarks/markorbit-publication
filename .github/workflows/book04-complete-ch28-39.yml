name: Complete Book 04 CH28-CH39

on:
  push:
    branches:
      - agent/book-04-ch00-27-review
    paths:
      - .github/book04-ch28-39-payload.b64
      - .github/workflows/book04-complete-ch28-39.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/book-04-ch00-27-review
          fetch-depth: 0

      - name: Decode and apply manuscript payload
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import base64
          import gzip
          import io
          import json
          import os
          from pathlib import Path
          import subprocess
          import tarfile
          import tempfile

          root = Path.cwd().resolve()
          payload_path = root / ".github/book04-ch28-39-payload.b64"
          encoded = "".join(payload_path.read_text(encoding="utf-8").split())
          compressed = base64.b64decode(encoded)
          decoded = gzip.decompress(compressed)

          def safe_path(relative: str) -> Path:
              candidate = (root / relative).resolve()
              if root not in candidate.parents and candidate != root:
                  raise RuntimeError(f"Payload path escapes repository: {relative}")
              return candidate

          # Preferred form: gzip-compressed tar archive.
          try:
              with tarfile.open(fileobj=io.BytesIO(compressed), mode="r:gz") as archive:
                  members = archive.getmembers()
                  for member in members:
                      name = member.name
                      if member.islnk() or member.issym():
                          raise RuntimeError(f"Links are not allowed in payload: {name}")
                      safe_path(name)
                  archive.extractall(root)
              print(f"Applied tar payload with {len(members)} members")
          except tarfile.ReadError:
              text = decoded.decode("utf-8")
              stripped = text.lstrip()
              applied = False

              # Supported JSON forms:
              # {"files": {"path": "content"}} or {"path": "content"}.
              if stripped.startswith("{"):
                  data = json.loads(text)
                  files = data.get("files", data)
                  if not isinstance(files, dict):
                      raise RuntimeError("JSON payload must contain a files mapping")
                  for relative, content in files.items():
                      if not isinstance(relative, str) or not isinstance(content, str):
                          raise RuntimeError("Invalid path/content entry in JSON payload")
                      target = safe_path(relative)
                      target.parent.mkdir(parents=True, exist_ok=True)
                      target.write_text(content, encoding="utf-8")
                  print(f"Applied JSON payload with {len(files)} files")
                  applied = True

              if not applied:
                  with tempfile.TemporaryDirectory() as tmp:
                      script = Path(tmp) / "apply_payload"
                      script.write_text(text, encoding="utf-8")
                      if stripped.startswith("#!") and "python" in stripped.splitlines()[0]:
                          command = ["python", str(script)]
                      elif "from pathlib import Path" in text or "import json" in text:
                          command = ["python", str(script)]
                      else:
                          command = ["bash", str(script)]
                      subprocess.run(command, cwd=root, check=True)
                      print("Applied executable text payload")
          PY

      - name: Validate complete Book 04 manuscript
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          book = Path("books/book-04-workplace-product-architecture")
          manuscript = book / "manuscript"
          files = sorted(manuscript.glob("B04-CH-*.md"))

          by_number = {}
          for path in files:
              match = re.match(r"B04-CH-(\d{2})_", path.name)
              if match:
                  by_number[int(match.group(1))] = path

          expected = list(range(40))
          actual = sorted(by_number)
          if actual != expected:
              raise SystemExit(f"Expected CH00-CH39, found: {actual}")

          errors = []
          for number in expected:
              path = by_number[number]
              text = path.read_text(encoding="utf-8")
              first = text.splitlines()[0] if text.splitlines() else ""
              if not first.startswith(f"# B04-CH-{number:02d} — "):
                  errors.append(f"{path.name}: invalid first heading: {first!r}")
              if text.count("```") % 2:
                  errors.append(f"{path.name}: unbalanced fenced code blocks")

              numbered = []
              for line in text.splitlines():
                  m = re.match(r"## (\d+)\. ", line)
                  if m:
                      numbered.append(int(m.group(1)))
              if numbered and numbered != list(range(1, len(numbered) + 1)):
                  errors.append(f"{path.name}: non-sequential numbered sections")

          remaining = list(manuscript.glob("B04-CH-[4-9][0-9]_*.md"))
          if remaining:
              errors.append(f"Unexpected chapters beyond CH39: {[p.name for p in remaining]}")

          required = [
              book / "README.md",
              book / "BOOK-MANIFEST.md",
              book / "BOOK-STATUS.md",
              book / "publication.yaml",
          ]
          for path in required:
              if not path.exists() or not path.read_text(encoding="utf-8").strip():
                  errors.append(f"Missing or empty required file: {path}")

          if errors:
              raise SystemExit("\n".join(errors))

          print("Validated CH00-CH39: 40 files, headings valid, fences balanced, numbering sequential")
          PY

      - name: Remove temporary application files
        shell: bash
        run: |
          rm -f .github/book04-ch28-39-payload.b64
          rm -f .github/workflows/book04-complete-ch28-39.yml

      - name: Commit completed manuscript
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Complete Book 04 Draft 1"
          git push origin HEAD:agent/book-04-ch00-27-review
