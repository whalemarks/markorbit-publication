name: Complete Book 04 CH28-CH39

on:
  push:
    branches:
      - agent/book-04-ch00-27-review
    paths:
      - .github/book04-ch28-39-payload-v2.part*
      - .github/book04-payload-v2.part*
      - .github/workflows/book04-complete-ch28-39.yml

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: agent/book-04-ch00-27-review
          fetch-depth: 0

      - name: Assemble and verify manuscript payload
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/book04-ch28-39-payload-v2.part00 \
            .github/book04-ch28-39-payload-v2.part01 \
            .github/book04-ch28-39-payload-v2.part02 \
            .github/book04-ch28-39-payload-v2.part03 \
            .github/book04-ch28-39-payload-v2.part04 \
            .github/book04-ch28-39-payload-v2.part05 \
            .github/book04-payload-v2.part06-00 \
            .github/book04-payload-v2.part06-01 \
            .github/book04-payload-v2.part06-02 \
            .github/book04-payload-v2.part06-03 \
            .github/book04-payload-v2.part06-04 \
            .github/book04-payload-v2.part06-05 \
            .github/book04-payload-v2.part07-00 \
            .github/book04-payload-v2.part07-01 \
            .github/book04-payload-v2.part07-02 \
            .github/book04-payload-v2.part07-03 \
            .github/book04-payload-v2.part07-04 \
            .github/book04-payload-v2.part07-05 \
            > /tmp/book04-payload.b64

          echo "07670c20db1f6ad8e5a2e97cf37cf16d0ee76b98204196d5422e7c33b7863d6d  /tmp/book04-payload.b64" | sha256sum --check
          base64 --decode /tmp/book04-payload.b64 > /tmp/book04-payload.tar.gz
          echo "3be3a4556eee922a43fdd246fd51c2dc923a2e213aa29a7f734c11d8135ca600  /tmp/book04-payload.tar.gz" | sha256sum --check
          tar -tzf /tmp/book04-payload.tar.gz
          tar -xzf /tmp/book04-payload.tar.gz

      - name: Validate complete Book 04 manuscript
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          book = Path("books/book-04-workplace-product-architecture")
          manuscript = book / "manuscript"
          files = sorted(manuscript.glob("B04-CH-*.md"))

          by_number = {}
          for path in files:
              match = re.match(r"B04-CH-(\d{2})_", path.name)
              if match:
                  by_number[int(match.group(1))] = path

          expected = list(range(40))
          actual = sorted(by_number)
          if actual != expected:
              raise SystemExit(f"Expected CH00-CH39, found: {actual}")

          errors = []
          for number in expected:
              path = by_number[number]
              text = path.read_text(encoding="utf-8")
              first = text.splitlines()[0] if text.splitlines() else ""
              if not first.startswith(f"# B04-CH-{number:02d} — "):
                  errors.append(f"{path.name}: invalid first heading: {first!r}")
              if text.count("```") % 2:
                  errors.append(f"{path.name}: unbalanced fenced code blocks")

              numbered = []
              for line in text.splitlines():
                  match = re.match(r"## (\d+)\. ", line)
                  if match:
                      numbered.append(int(match.group(1)))
              if numbered and numbered != list(range(1, len(numbered) + 1)):
                  errors.append(f"{path.name}: non-sequential numbered sections")

          remaining = list(manuscript.glob("B04-CH-[4-9][0-9]_*.md"))
          if remaining:
              errors.append(f"Unexpected chapters beyond CH39: {[p.name for p in remaining]}")

          required = [
              book / "README.md",
              book / "BOOK-MANIFEST.md",
              book / "BOOK-STATUS.md",
              book / "publication.yaml",
          ]
          for path in required:
              if not path.exists() or not path.read_text(encoding="utf-8").strip():
                  errors.append(f"Missing or empty required file: {path}")

          if errors:
              raise SystemExit("\n".join(errors))

          print("Validated CH00-CH39: 40 files, headings valid, fences balanced, numbering sequential")
          PY

      - name: Remove temporary application files
        shell: bash
        run: |
          rm -f .github/book04-ch28-39-payload.b64
          rm -f .github/book04-ch28-39-payload-v2.part*
          rm -f .github/book04-payload-v2.part*
          rm -f .github/workflows/book04-complete-ch28-39.yml

      - name: Commit completed manuscript
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Complete Book 04 Draft 1"
          git push origin HEAD:agent/book-04-ch00-27-review
